<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Contact Us</title>
    <style>
    body {
    font-family: 'Times New Roman', Times, serif;
    margin: 0;
    padding: 0;
    background: url('https://i.pinimg.com/736x/ac/a6/2a/aca62ac050ce6983687064a732c3c356.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #333;
    position: relative;
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.6); /* Semi-transparent white overlay */
    z-index: -1;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    padding: 50px;
    gap: 100px;
    min-height: 100vh;
    box-sizing: border-box;
}

.left-section {
    flex: 1;
    max-width: 500px;
    padding: 20px;
}

.left-section h2 {
    font-size: 36px;
    margin-bottom: 20px;
    font-weight: normal;
    text-align: center;
    color: black; /* Changed to black for better visibility */
}

.left-section p {
    font-size: 18px;
    margin-bottom: 30px;
    text-align: center;
    color: black; /* Changed to black for better visibility */
}

.social-icons {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.social-icons img {
    width: 50px;
    height: 50px;
    cursor: pointer;
    border: none;
    border-radius: 0;
    margin: 0;
}

.right-section {
    flex: 1;
    max-width: 500px;
    padding: 20px;
}

.form-group {
    margin-bottom: 25px;
}

.form-group label {
    display: block;
    margin-bottom: 10px;
    font-size: 18px;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
}

.form-group .name-fields {
    display: flex;
    gap: 15px;
}

.form-group .name-fields input {
    flex: 1;
    height: 50px;
}

.form-group textarea {
    resize: vertical;
    height: 150px;
}

.submit-btn {
    background-color: #000;
    color: #fff;
    padding: 15px 25px;
    font-size: 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
}

.submit-btn:hover {
    background-color: #444;
}

.success-message {
    margin-top: 15px;
    color: green;
    font-size: 18px;
    display: none;
}
</style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}" style="padding-bottom: 5px;">
                <span style="
                    color:#00b300; /* Bright green for 'Plant' */
                    font-family: 'Roboto', sans-serif;
                    font-size: 30px;
                    font-weight: 400;
                    line-height: 1.1;
                    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
                ">Plant</span>
                <span style="
                    color: #FFC107; /* Softer Yellow for 'Insight' */
                    font-family: 'Roboto', sans-serif;
                    font-size: 30px;
                    font-weight: 400; /* Matching 'Plant' thickness */
                    line-height: 1.1;
                    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2); /* Subtle shadow */
                ">Insight</span>
            </a>
              
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('about') }}">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('why_plantai') }}">Why Plant Insight</a>

                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('plant_diseases') }}">Plant Diseases</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('contact_us') }}">Contact Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="left-section">
            <h2>Press & General Inquiries</h2>
            <p>If you have any questions or comments, please fill out the form to the right.</p>
            <div class="social-icons">
                <a href="https://www.facebook.com" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
                </a>
                <a href="https://www.discord.com" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord">
                </a>
                <a href="https://www.instagram.com" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" alt="Instagram">
                </a>
                <a href="https://www.linkedin.com" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/145/145807.png" alt="LinkedIn">
                </a>
            </div>
        </div>
        <div class="right-section" style="padding-top: 40px;">
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Name (required)</label>
                    <div class="name-fields">
                        <input type="text" id="first-name" placeholder="First Name" required>
                        <input type="text" id="last-name" placeholder="Last Name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Your Email (required)</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject (required)</label>
                    <input type="text" id="subject" placeholder="Enter subject" required>
                </div>
                <div class="form-group">
                    <label for="message">Message (required)</label>
                    <textarea id="message" placeholder="Enter your message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit</button>
                <p class="success-message">Your message has been sent successfully!</p>
            </form>            
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
    // Initialize EmailJS
    emailjs.init("ExllNS3jc8zEFpDhI"); // Replace YOUR_PUBLIC_KEY with your actual public key

    // Add event listener for form submission
    document.querySelector("form").addEventListener("submit", function (e) {
        e.preventDefault();

        // Collect form data
        const firstName = document.getElementById("first-name").value;
        const lastName = document.getElementById("last-name").value;
        const email = document.getElementById("email").value;
        const subject = document.getElementById("subject").value;
        const message = document.getElementById("message").value;

        // Prepare template parameters
        const templateParams = {
            first_name: firstName,
            last_name: lastName,
            user_email: email,
            subject: subject,
            message: message,
        };

        // Send email using EmailJS
        emailjs.send("service_x8d7em5", "template_vd7o27l", templateParams)
            .then(function (response) {
                console.log("Email sent successfully!", response.status, response.text);
                alert("Your message has been sent successfully!");
                document.querySelector("form").reset(); // Reset the form after successful submission
            })
            .catch(function (error) {
                console.error("Failed to send email:", error);
                alert("Failed to send message. Please try again later.");
            });
    });
</script>
</body>
</html>
